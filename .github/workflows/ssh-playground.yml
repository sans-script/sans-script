name: SSH Playground Environment

on:
  workflow_dispatch:

jobs:
  ssh-access:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH Server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" >> ~/.ssh/authorized_keys
          chmod 600 ~/.ssh/authorized_keys
          sudo service ssh start

      - name: Install and start ngrok tunnel
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          nohup ngrok tcp 22 --log stdout > ngrok.log 2>&1 &

          echo "ūüĒó Waiting for ngrok tunnel to be ready..."
          for i in {1..20}; do
            sleep 1
            NGROK_URL=$(grep -oE 'tcp://[0-9a-zA-Z.]+:[0-9]+' ngrok.log | head -n 1)
            if [[ $NGROK_URL == tcp://* ]]; then
              echo "ūüĒó Ngrok tunnel ready: $NGROK_URL"
              break
            fi
          done

          if [ -z "$NGROK_URL" ]; then
            echo "‚ĚĆ Ngrok tunnel not found in time!" >&2
            echo "ūüďú ngrok.log output:"
            cat ngrok.log
            exit 1
          fi

