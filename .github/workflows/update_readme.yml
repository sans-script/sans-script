name: Update README after Workflow1

on:
  workflow_run:
    workflows: ["Waka Readme"]  # Nome do primeiro workflow
    types:
      - completed
  schedule:
    # Runs at 12am IST, which is 18:35 UTC
    - cron: '35 18 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      - name: Set up Python and Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dateutil
          
      - name: Git pull
        run: |
          git pull origin main  # Atualiza o branch local com as alterações do repositório remoto
          
      - name:  Run Python script
        run: |
          python update_readme.py
      
      - name: Commit and push changes
        run: |
          git config --local user.email "python3@github.com"
          git config --local user.name "Python"
          git add README.md
          git diff --quiet || git commit -m "Update README with stats"
          git push
