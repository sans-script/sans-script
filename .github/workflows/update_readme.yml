name: Python Update README.md
on:
  workflow_run:
    workflows: ["WakaTime Stats"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: update-readme
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python and Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-dotenv google-generativeai python-dateutil

      - name: Run Python Script and Update README.md
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_readme.py

      - name: Commit and Push Changes
        run: |
          git config user.email "alexhere.user@gmail.com"
          git config user.name "Alexandre Santos"
          git pull origin main
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update README.md"
          git push origin main
